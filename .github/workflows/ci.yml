name: CI

# Runs the unit suite, a production build, and the package-size budget on
# every push and PR. Publishing to the Chrome Web Store / Firefox AMO stays
# manual (store review + secrets), so there is no deploy job — but pushing a
# v* tag packages a ready-to-upload zip as a GitHub Release asset.

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm run size

  package:
    # Only when a v* tag is pushed: build, zip the shipped files, attach to a
    # Release so you can grab the exact artifact to upload to each store.
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Package extension
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          zip -r "skim-${VERSION}.zip" \
            manifest.json src dist vendor assets _locales examples \
            -x '*/.DS_Store'
          ls -lh "skim-${VERSION}.zip"

      - name: Attach to Release
        uses: softprops/action-gh-release@v2
        with:
          files: skim-*.zip
