<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5674dd"/>
      <stop offset="1" stop-color="#8aabff"/>
    </linearGradient>
    <filter id="winshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0d1017" flood-opacity="0.38"/>
    </filter>
    <filter id="pillshadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0d1017" flood-opacity="0.32"/>
    </filter>
    <marker id="arrowY" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="4.6" markerHeight="4.6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#ffd866"/>
    </marker>
    <clipPath id="termclip"><rect x="64" y="196" width="520" height="624" rx="12"/></clipPath>
    <clipPath id="winclip"><rect x="648" y="196" width="568" height="624" rx="12"/></clipPath>
    <g id="skimicon">
      <rect width="24" height="24" rx="5.5" fill="#0d1017" stroke="#2c3344" stroke-width="1"/>
      <rect x="4.5" y="6.2" width="15" height="2.1" rx="1.05" fill="#e8eaf0"/>
      <rect x="4.5" y="10.9" width="10.5" height="2.1" rx="1.05" fill="#7aa2ff"/>
      <rect x="4.5" y="15.6" width="6.4" height="2.1" rx="1.05" fill="#4a5164"/>
      <circle cx="18.4" cy="16.7" r="1.4" fill="#ffd866"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- Headline -->
  <text x="640" y="102" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Live-reloads while your agent writes.</text>

  <!-- ================= Terminal card ================= -->
  <rect x="64" y="196" width="520" height="624" rx="12" fill="#0d1017" filter="url(#winshadow)"/>
  <g clip-path="url(#termclip)">
    <rect x="64" y="196" width="520" height="624" fill="#0d1017"/>
    <rect x="64" y="196" width="520" height="52" fill="#161b26"/>
    <line x1="64" y1="248" x2="584" y2="248" stroke="#232838" stroke-width="1"/>
    <circle cx="94" cy="222" r="6" fill="#e0655f"/>
    <circle cx="116" cy="222" r="6" fill="#e0b34e"/>
    <circle cx="138" cy="222" r="6" fill="#57b56a"/>
    <text x="324" y="227" text-anchor="middle" font-family="JetBrains Mono, DejaVu Sans Mono, monospace" font-size="13" fill="#9aa3b8">nir@dev: ~/project</text>

    <!-- Terminal body -->
    <g font-family="JetBrains Mono, DejaVu Sans Mono, monospace" font-size="15">
      <text x="94" y="300"><tspan fill="#4fb886">$</tspan><tspan fill="#e8eaf0"> claude "implement the plan"</tspan></text>

      <text x="94" y="356"><tspan fill="#ffd866">&#9679;</tspan><tspan fill="#9aa3b8"> Planning the feature&#8230;</tspan></text>
      <rect x="94" y="376" width="300" height="11" rx="5.5" fill="#232a3a"/>
      <rect x="94" y="402" width="356" height="11" rx="5.5" fill="#232a3a"/>

      <text x="94" y="458"><tspan fill="#7aa2ff">&#9679;</tspan><tspan fill="#e8eaf0"> Writing plan.md</tspan></text>
      <text x="94" y="490"><tspan fill="#4a5164">&#9084;</tspan><tspan fill="#9aa3b8">  Wrote 142 lines to </tspan><tspan fill="#e8eaf0">plan.md</tspan></text>

      <rect x="94" y="512" width="380" height="11" rx="5.5" fill="#232a3a"/>
      <rect x="94" y="538" width="276" height="11" rx="5.5" fill="#232a3a"/>

      <text x="94" y="596"><tspan fill="#ffd866">&#9679;</tspan><tspan fill="#9aa3b8"> Updating plan.md&#8230;</tspan></text>
    </g>
    <!-- streaming cursor -->
    <rect x="94" y="616" width="10" height="19" fill="#7aa2ff"/>
    <circle cx="118" cy="631" r="3" fill="#4a5164"/>
    <circle cx="132" cy="631" r="3" fill="#3a4152"/>
    <circle cx="146" cy="631" r="3" fill="#2c3344"/>
  </g>

  <!-- ================= Skim window ================= -->
  <rect x="648" y="196" width="568" height="624" rx="12" fill="#15151a" filter="url(#winshadow)"/>
  <g clip-path="url(#winclip)">
    <rect x="648" y="196" width="568" height="624" fill="#15151a"/>
    <rect x="648" y="196" width="568" height="52" fill="#0b0e14"/>
    <line x1="648" y1="248" x2="1216" y2="248" stroke="#232838" stroke-width="1"/>
    <use xlink:href="#skimicon" x="672" y="210"/>
    <rect x="708" y="208" width="300" height="28" rx="14" fill="#161b26"/>
    <text x="726" y="227" font-family="JetBrains Mono, DejaVu Sans Mono, monospace" font-size="13" fill="#9aa3b8">file:///~/project/plan.md</text>
    <g stroke="#4a5164" stroke-width="2" fill="none">
      <path d="M1176 216 a8 8 0 1 1 -6 2.6"/>
      <path d="M1166 215 l4 3.6 -5 2.4 z" fill="#4a5164" stroke="none"/>
    </g>

    <!-- Doc content -->
    <rect x="688" y="282" width="243" height="38" rx="3" fill="#6b6be4"/>
    <text x="708" y="308" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#f4f2b0">Implementation Plan</text>

    <text x="688" y="372" font-family="Inter, system-ui, sans-serif" font-size="21" font-weight="700"><tspan fill="#7e7e86">## </tspan><tspan fill="#4ab8f5">Overview</tspan></text>
    <g fill="#333340">
      <rect x="688" y="394" width="488" height="13" rx="6.5"/>
      <rect x="688" y="420" width="452" height="13" rx="6.5"/>
      <rect x="688" y="446" width="300" height="13" rx="6.5"/>
    </g>

    <!-- Freshly written block (highlighted, still streaming in) -->
    <rect x="676" y="486" width="512" height="152" rx="6" fill="#7aa2ff" opacity="0.10"/>
    <rect x="676" y="486" width="3" height="152" rx="1.5" fill="#4ab8f5"/>
    <text x="696" y="522" font-family="Inter, system-ui, sans-serif" font-size="21" font-weight="700"><tspan fill="#7e7e86">## </tspan><tspan fill="#4ab8f5">Implementation steps</tspan></text>
    <g fill="#3b3b4a">
      <rect x="696" y="546" width="452" height="13" rx="6.5"/>
      <rect x="696" y="572" width="400" height="13" rx="6.5"/>
      <rect x="696" y="598" width="220" height="13" rx="6.5"/>
    </g>
    <rect x="926" y="595" width="10" height="19" fill="#7aa2ff"/>

    <!-- Trailing ghosts -->
    <g fill="#333340">
      <rect x="688" y="668" width="488" height="13" rx="6.5"/>
      <rect x="688" y="694" width="420" height="13" rx="6.5"/>
      <rect x="688" y="720" width="460" height="13" rx="6.5"/>
    </g>
  </g>

  <!-- Yellow arrow: terminal write line -> fresh block in Skim -->
  <path d="M 372 470 C 560 470, 560 545, 664 550" fill="none" stroke="#ffd866" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowY)"/>

  <!-- Callout pill -->
  <g filter="url(#pillshadow)">
    <rect x="422" y="690" width="436" height="76" rx="38" fill="#ffd866"/>
    <rect x="438" y="690" width="420" height="76" rx="38" fill="#ffffff"/>
  </g>
  <!-- refresh icon -->
  <g stroke="#565b66" stroke-width="3.4" fill="none" stroke-linecap="round">
    <path d="M494 714 a15 15 0 1 1 -11 5"/>
  </g>
  <path d="M478 712 l8 7 -10 4.6 z" fill="#565b66"/>
  <text x="528" y="738" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="600" fill="#4a4f59">Updates on every save</text>
</svg>
