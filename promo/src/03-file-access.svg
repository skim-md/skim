<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5674dd"/>
      <stop offset="1" stop-color="#8aabff"/>
    </linearGradient>
    <filter id="winshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0d1017" flood-opacity="0.38"/>
    </filter>
    <filter id="cardshadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowY" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="4.6" markerHeight="4.6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#ffd866"/>
    </marker>
    <clipPath id="winclip"><rect x="64" y="176" width="1152" height="644" rx="12"/></clipPath>
    <g id="skimicon">
      <rect width="24" height="24" rx="5.5" fill="#0d1017" stroke="#2c3344" stroke-width="1"/>
      <rect x="4.5" y="6.2" width="15" height="2.1" rx="1.05" fill="#e8eaf0"/>
      <rect x="4.5" y="10.9" width="10.5" height="2.1" rx="1.05" fill="#7aa2ff"/>
      <rect x="4.5" y="15.6" width="6.4" height="2.1" rx="1.05" fill="#4a5164"/>
      <circle cx="18.4" cy="16.7" r="1.4" fill="#ffd866"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- Headline -->
  <text x="640" y="102" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="-0.5">One switch. We walk you through it.</text>

  <!-- Window shadow backing -->
  <rect x="64" y="176" width="1152" height="644" rx="12" fill="#0d1017" filter="url(#winshadow)"/>

  <g clip-path="url(#winclip)">
    <!-- Page background -->
    <rect x="64" y="176" width="1152" height="644" fill="#0d1017"/>
    <!-- Browser chrome -->
    <rect x="64" y="176" width="1152" height="52" fill="#0b0e14"/>
    <line x1="64" y1="228" x2="1216" y2="228" stroke="#232838" stroke-width="1"/>
    <use xlink:href="#skimicon" x="88" y="190"/>
    <rect x="124" y="188" width="430" height="28" rx="14" fill="#161b26"/>
    <text x="142" y="207" font-family="JetBrains Mono, DejaVu Sans Mono, monospace" font-size="13" fill="#9aa3b8">Skim &#8212; enable local files</text>
    <g stroke="#4a5164" stroke-width="2" fill="none">
      <path d="M1146 196 a8 8 0 1 1 -6 2.6"/>
      <path d="M1136 195 l4 3.6 -5 2.4 z" fill="#4a5164" stroke="none"/>
    </g>
    <g fill="#4a5164">
      <circle cx="1186" cy="196" r="2.2"/><circle cx="1186" cy="203" r="2.2"/><circle cx="1186" cy="210" r="2.2"/>
    </g>

    <!-- Page heading -->
    <text x="640" y="296" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="21" font-weight="600" fill="#e8eaf0">To read local markdown files with Skim, enable access to file URLs.</text>
    <text x="640" y="328" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="21" font-weight="600" fill="#e8eaf0">This page then reloads by itself.</text>

    <!-- Walkthrough card (mimics chrome://extensions details) -->
    <g filter="url(#cardshadow)">
      <rect x="410" y="366" width="460" height="266" rx="12" fill="#161b26" stroke="#2c3344" stroke-width="1"/>
    </g>
    <use xlink:href="#skimicon" x="434" y="386"/>
    <text x="468" y="403" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e8eaf0">Skim &#8212; Markdown Viewer &amp; Reader</text>
    <line x1="434" y1="422" x2="846" y2="422" stroke="#2c3344" stroke-width="1"/>
    <rect x="434" y="440" width="180" height="12" rx="6" fill="#232a3a"/>
    <rect x="434" y="466" width="412" height="12" rx="6" fill="#232a3a"/>

    <!-- Toggle row (the one switch) -->
    <rect x="430" y="492" width="420" height="48" rx="8" fill="#0d1017" stroke="#7aa2ff" stroke-width="1.6"/>
    <text x="448" y="522" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#e8eaf0">Allow access to file URLs</text>
    <rect x="790" y="505" width="40" height="22" rx="11" fill="#7aa2ff"/>
    <circle cx="821" cy="516" r="9" fill="#e8eaf0"/>

    <rect x="434" y="558" width="412" height="12" rx="6" fill="#232a3a"/>
    <rect x="434" y="584" width="180" height="12" rx="6" fill="#232a3a"/>

    <!-- Status line -->
    <text x="640" y="674" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#4ade80">&#10003; Access enabled. Reloading&#8230;</text>

    <!-- Action buttons -->
    <rect x="468" y="702" width="170" height="46" rx="23" fill="#7aa2ff"/>
    <text x="553" y="731" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#0d1017">Open settings</text>
    <rect x="658" y="702" width="134" height="46" rx="23" fill="#161b26" stroke="#2c3344" stroke-width="1"/>
    <text x="725" y="731" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#e8eaf0">No thanks</text>
  </g>

  <!-- Yellow accent: circle around the toggle + arrow -->
  <ellipse cx="810" cy="516" rx="52" ry="34" fill="none" stroke="#ffd866" stroke-width="5"/>
  <path d="M 962 398 C 972 448, 940 484, 878 502" fill="none" stroke="#ffd866" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowY)"/>
</svg>
