<!doctype html>
<html>
<head><meta charset="utf-8"><title>Skim settings</title>
<link rel="stylesheet" href="../popup/popup.css">
<style>body { width: 420px; margin: 24px auto; }</style></head>
<body>
  <header class="skim-pop-head"><img src="../../assets/icon48.png" width="20" height="20" alt=""> <strong>Skim</strong></header>

  <section id="file-cta" hidden>
    <p id="file-cta-msg">To read <code>.md</code> files from your computer, Chrome needs one switch flipped:</p>
    <ol><li>Click the button below</li><li>Turn on <strong>“Allow access to file URLs”</strong></li></ol>
    <button id="open-settings" class="primary">Open Skim’s Chrome settings</button>
  </section>

  <section id="controls" hidden>
    <label>Theme
      <select id="theme"><option value="dark">Dark</option><option value="light">Light</option></select>
    </label>
    <label>Reading zoom
      <select id="zoom"><option value="0">Off</option><option value="1.25">125%</option><option value="1.5">150%</option></select>
    </label>
    <label class="row"><input type="checkbox" id="autoreload"> Auto-reload when the file changes</label>
    <label class="row"><input type="checkbox" id="mermaid"> Render mermaid diagrams</label>
    <button id="force-render">Render this page as Markdown</button>
  </section>

  <footer><a href="https://github.com/skim-md/skim" target="_blank" rel="noopener">Open source ♥ GitHub</a></footer>
  <script type="module" src="../popup/popup.js"></script>
</body>
</html>
